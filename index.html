<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>99 Asmaul Husna</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b1a1e;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: #e8e0d4;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            color: #d4af37;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .subtitle {
            text-align: center;
            color: #b9ad9a;
            font-size: 1.1rem;
            margin-bottom: 30px;
            border-top: 1px solid #d4af3750;
            border-bottom: 1px solid #d4af3750;
            padding: 10px 0;
            display: inline-block;
            width: 100%;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid #d4af3760;
            color: #d4c9b8;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.3s;
            background: #1e2f2e40;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #d4af37;
            color: #0b1a1e;
            border-color: #d4af37;
            box-shadow: 0 0 20px #d4af3760;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .card {
            background: linear-gradient(145deg, #1b3338, #0f2024);
            border-radius: 15px;
            padding: 12px 10px 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            border: 1px solid #d4af3720;
            transition: 0.3s;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.8);
            border-color: #d4af3770;
        }

        .card .box {
            width: 100%;
            aspect-ratio: 1/1;
            background: #0e1e22;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #d4af3730;
            font-size: 1.6rem;
            color: #f3e9d2;
            font-weight: bold;
            padding: 10px;
            word-break: break-word;
            line-height: 1.4;
            text-align: center;
            font-family: 'Arial', sans-serif;
        }

        .card .label {
            margin-top: 8px;
            font-size: 0.75rem;
            color: #b9ad9a;
            background: #0b1a1e80;
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
            border: 1px solid #d4af3720;
        }

        .card .tag {
            font-size: 0.55rem;
            color: #8f8575;
            margin-top: 4px;
            background: #00000040;
            padding: 2px 8px;
            border-radius: 20px;
            display: inline-block;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #d4af3720;
            color: #8f8575;
            font-size: 0.9rem;
        }

        .footer span {
            color: #d4af37;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #b9ad9a;
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 10px;
            }
            .card .box {
                font-size: 1.2rem;
            }
            .filter-btn {
                font-size: 0.8rem;
                padding: 6px 14px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✦ 99 Asmaul Husna ✦</h1>
        <div class="subtitle">Kaligrafi · Umar · Muhammad</div>

        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-filter="all">Semua</button>
            <button class="filter-btn" data-filter="asmaul-husna">Asmaul Husna</button>
            <button class="filter-btn" data-filter="umar">Umar</button>
            <button class="filter-btn" data-filter="muhammad">Muhammad</button>
            <button class="filter-btn" data-filter="lainnya">Lainnya</button>
        </div>

        <div class="grid" id="grid"></div>

        <div class="footer">
            <span>♥</span> Kaligrafi Animasi · 99 Asmaul Husna <span>♥</span>
        </div>
    </div>

    <script>
        // ===== DATA =====
        const asmaulHusna = [
            "الرَّحْمَنُ", "الرَّحِيمُ", "الْمَلِكُ", "الْقُدُّوسُ", "السَّلَامُ",
            "الْمُؤْمِنُ", "الْمُهَيْمِنُ", "الْعَزِيزُ", "الْجَبَّارُ", "الْمُتَكَبِّرُ",
            "الْخَالِقُ", "الْبَارِئُ", "الْمُصَوِّرُ", "الْغَفَّارُ", "الْقَهَّارُ",
            "الْوَهَّابُ", "الرَّزَّاقُ", "الْفَتَّاحُ", "الْعَلِيمُ", "الْقَابِضُ",
            "الْبَاسِطُ", "الْخَافِضُ", "الرَّافِعُ", "الْمُعِزُّ", "الْمُذِلُّ",
            "السَّمِيعُ", "الْبَصِيرُ", "الْحَكَمُ", "الْعَدْلُ", "اللَّطِيفُ",
            "الْخَبِيرُ", "الْحَلِيمُ", "الْعَظِيمُ", "الْغَفُورُ", "الشَّكُورُ",
            "الْعَلِيُّ", "الْكَبِيرُ", "الْحَفِيظُ", "الْمُقِيتُ", "الْحَسِيبُ",
            "الْجَلِيلُ", "الْكَرِيمُ", "الرَّقِيبُ", "الْمُجِيبُ", "الْوَاسِعُ",
            "الْحَكِيمُ", "الْوَدُودُ", "الْمَجِيدُ", "الْبَاعِثُ", "الشَّهِيدُ",
            "الْحَقُّ", "الْوَكِيلُ", "الْقَوِيُّ", "الْمَتِينُ", "الْوَلِيُّ",
            "الْحَمِيدُ", "الْمُحْصِي", "الْمُبْدِئُ", "الْمُعِيدُ", "الْمُحْيِي",
            "الْمُمِيتُ", "الْحَيُّ", "الْقَيُّومُ", "الْوَاجِدُ", "الْمَاجِدُ",
            "الْوَاحِدُ", "الْأَحَدُ", "الصَّمَدُ", "الْقَادِرُ", "الْمُقْتَدِرُ",
            "الْمُقَدِّمُ", "الْمُؤَخِّرُ", "الْأَوَّلُ", "الْآخِرُ", "الظَّاهِرُ",
            "الْبَاطِنُ", "الْوَالِي", "الْمُتَعَالِي", "الْبَرُّ", "التَّوَّابُ",
            "الْمُنْتَقِمُ", "الْعَفُوُّ", "الرَّؤُوفُ", "مَالِكُ الْمُلْكِ", "ذُو الْجَلَالِ",
            "الْمُقْسِطُ", "الْجَامِعُ", "الْغَنِيُّ", "الْمُغْنِي", "الْمَانِعُ",
            "الضَّارُ", "النَّافِعُ", "النُّورُ", "الْهَادِي", "الْبَدِيعُ",
            "الْبَاقِي", "الْوَارِثُ", "الرَّشِيدُ", "الصَّبُورُ"
        ];

        const extra = [
            { text: "عُمَر الْفَارُوق", cat: "umar" },
            { text: "عُمَر بْن الْخَطَّاب", cat: "umar" },
            { text: "الْخَلِيفَة عُمَر", cat: "umar" },
            { text: "مُحَمَّد", cat: "muhammad" },
            { text: "النَّبِي مُحَمَّد", cat: "muhammad" },
            { text: "رَسُول اللَّه", cat: "muhammad" },
            { text: "بِسْمِ اللَّه", cat: "lainnya" },
            { text: "اللَّهُ أَكْبَر", cat: "lainnya" },
            { text: "لَا إِلَهَ إِلَّا اللَّه", cat: "lainnya" },
            { text: "سُبْحَانَ اللَّه", cat: "lainnya" },
            { text: "الْحَمْدُ لِلَّه", cat: "lainnya" },
            { text: "مَا شَاءَ اللَّه", cat: "lainnya" },
        ];

        let allData = [];
        asmaulHusna.forEach((text, i) => {
            allData.push({ id: i + 1, text: text, cat: "asmaul-husna" });
        });
        extra.forEach((item, i) => {
            allData.push({ id: 200 + i, text: item.text, cat: item.cat });
        });

        // ===== RENDER =====
        const grid = document.getElementById('grid');
        const filterBtns = document.querySelectorAll('.filter-btn');

        // Warna berdasarkan kategori
        function getColor(cat) {
            if (cat === 'asmaul-husna') return '#f3e9d2';
            if (cat === 'umar') return '#d4af37';
            if (cat === 'muhammad') return '#7ec8e3';
            return '#b9ad9a';
        }

        function getLabel(cat) {
            if (cat === 'asmaul-husna') return 'Asmaul Husna';
            if (cat === 'umar') return 'UMAR';
            if (cat === 'muhammad') return 'MUHAMMAD';
            return 'LAINNYA';
        }

        function render(category = 'all') {
            let filtered = allData;
            if (category !== 'all') {
                filtered = allData.filter(item => item.cat === category);
            }

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="no-data">Tidak ada data untuk kategori ini</div>`;
                return;
            }

            let html = '';
            filtered.forEach(item => {
                const color = getColor(item.cat);
                const label = getLabel(item.cat);
                html += `
                        <div class="card">
                            <div class="box" style="color:${color}">${item.text}</div>
                            <div class="label">${item.text}</div>
                            <div class="tag">${label}</div>
                        </div>
                    `;
            });

            grid.innerHTML = html;
        }

        filterBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                filterBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                render(this.getAttribute('data-filter'));
            });
        });

        render('all');
    </script>

</body>
</html>
