    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b1a1e;
            background-image: radial-gradient(circle at 20% 30%, #1a3a3f, #0b1a1e 80%);
            min-height: 100vh;
            font-family: 'Amiri', 'Segoe UI', 'Times New Roman', serif;
            color: #e8e0d4;
            padding: 1.5rem 1rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* ===== HEADER ===== */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #f3e9d2;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem 1rem;
        }
        .header h1 i {
            color: #d4af37;
            font-size: 2.5rem;
            filter: drop-shadow(0 0 8px #d4af3766);
        }
        .header .sub {
            font-size: 1.2rem;
            color: #b9ad9a;
            border-top: 1px solid #d4af3750;
            border-bottom: 1px solid #d4af3750;
            display: inline-block;
            padding: 0.3rem 2rem;
            margin-top: 0.5rem;
            letter-spacing: 2px;
            background: #0b1a1e55;
            backdrop-filter: blur(2px);
        }
        
        /* ===== FILTER BAR ===== */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem 1rem;
            margin-bottom: 2rem;
        }
        .filter-btn {
            background: transparent;
            border: 1px solid #d4af3760;
            color: #d4c9b8;
            padding: 0.4rem 1.4rem;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.25s ease;
            font-family: 'Amiri', serif;
            letter-spacing: 1px;
            background: #1e2f2e40;
            backdrop-filter: blur(4px);
        }
        .filter-btn:hover,
        .filter-btn.active {
            background: #d4af37;
            color: #0b1a1e;
            border-color: #d4af37;
            box-shadow: 0 0 20px #d4af3760;
            transform: scale(1.03);
        }
        
        /* ===== GRID ===== */
        .gif-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.2rem;
        }
        .gif-card {
            background: linear-gradient(145deg, #1b3338, #0f2024);
            border-radius: 20px;
            padding: 0.8rem 0.6rem 0.6rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7), 0 0 0 1px #d4af3720;
            transition: 0.3s cubic-bezier(0.15, 0.75, 0.4, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .gif-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.8), 0 0 0 2px #d4af3770;
            background: #1f3a40;
        }
        .gif-wrapper {
            width: 100%;
            aspect-ratio: 1/1;
            background: #0e1e22;
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #d4af3730;
            box-shadow: inset 0 0 15px #00000055;
        }
        .gif-wrapper svg {
            width: 100%;
            height: 100%;
            display: block;
            background: #0a171b;
        }
        .gif-card .label {
            margin-top: 0.5rem;
            font-size: 0.95rem;
            color: #f0e2cc;
            background: #0b1a1e80;
            padding: 0.1rem 0.8rem;
            border-radius: 40px;
            border: 1px solid #d4af3740;
            width: fit-content;
            backdrop-filter: blur(4px);
        }
        .gif-card .label i {
            color: #d4af37;
            margin-right: 5px;
            font-size: 0.8rem;
        }
        .gif-card .tag {
            font-size: 0.6rem;
            color: #b9ad9a;
            margin-top: 3px;
            background: #00000040;
            padding: 0.05rem 0.6rem;
            border-radius: 30px;
            border: 1px solid #d4af3720;
        }
        .no-gif {
            color: #b9ad9a;
            padding: 2rem;
            text-align: center;
            font-size: 1.2rem;
            width: 100%;
        }
        
        /* ===== FOOTER ===== */
        .footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.95rem;
            color: #8f8575;
            border-top: 1px solid #d4af3720;
            padding-top: 1.8rem;
            letter-spacing: 1px;
        }
        .footer i {
            color: #d4af37;
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }
            .header .sub {
                font-size: 0.9rem;
                padding: 0.2rem 1rem;
            }
            .filter-btn {
                font-size: 0.8rem;
                padding: 0.2rem 0.9rem;
            }
            .gif-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 0.8rem;
            }
            .gif-card .label {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== HEADER ===== -->
        <div class="header">
            <h1><i class="fas fa-pen-fancy"></i> <span>99 Asmaul Husna</span> <i class="fas fa-moon"></i></h1>
            <div class="sub">✦ + Kaligrafi Umar · Muhammad ✦</div>
        </div>

            <button class="filter-btn" data-filter="muhammad"><i class="fas fa-flag"></i> Muhammad</button>
            <button class="filter-btn" data-filter="lainnya"><i class="fas fa-gem"></i> Lainnya</button>

        <!-- ===== GRID ===== -->

        <!-- ===== FOOTER ===== -->

            const extraData = [
                { arab: "عُمَر الْفَارُوق", latin: "Umar Al-Faruk", category: 'umar' },
                { arab: "عُمَر بْن الْخَطَّاب", latin: "Umar bin Khattab", category: 'umar' },
                { arab: "الْخَلِيفَة عُمَر", latin: "Khalifah Umar", category: 'umar' },

                { arab: "رَسُول اللَّه", latin: "Rasulullah", category: 'muhammad' },

            let allData = [];
            asmaulHusnaArab.forEach((item, idx) => {
                allData.push({ id: idx + 1, arab: item.arab, latin: item.latin, category: 'asmaul-husna' });
            });
            extraData.forEach((item, idx) => {
                allData.push({ id: 100 + idx, arab: item.arab, latin: item.latin, category: item.category });
            });

            // ===== FUNGSI BUAT SVG =====
            function createKaligrafiSVG(arabText, latinText, category) {
                let mainColor, subColor, fontSize;

                if (category === 'asmaul-husna') {
                    mainColor = '#f3e9d2';
                    subColor = '#d4af37';
                    fontSize = 36;
                } else if (category === 'umar') {
                    mainColor = '#d4af37';
                    subColor = '#f3e9d2';
                    fontSize = 34;
                } else if (category === 'muhammad') {
                    mainColor = '#7ec8e3';
                    subColor = '#f3e9d2';
                    fontSize = 34;
                } else {
                    mainColor = '#b9ad9a';
                    subColor = '#d4af37';
                    fontSize = 32;
                }

                if (arabText.length > 15) fontSize = 28;
                else if (arabText.length > 12) fontSize = 30;
                else if (arabText.length > 8) fontSize = 32;

                let categoryLabel = category === 'asmaul-husna' ? '✦ Asmaul Husna' :
                    category === 'umar' ? '⚔️ Umar Al-Faruk' :
                    category === 'muhammad' ? '🕌 Muhammad ﷺ' : '☪️ Kaligrafi';

                const uniqueId = latinText.replace(/\s/g, '');

                return `
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
                            <defs>
                                <radialGradient id="bg-${uniqueId}" cx="50%" cy="50%" r="50%">
                                    <stop offset="0%" stop-color="#1a3a3f"/>
                                    <stop offset="100%" stop-color="#0a171b"/>
                                </radialGradient>
                                <filter id="glow-${uniqueId}">
                                    <feGaussianBlur stdDeviation="3"/>
                                    <feMerge>
                                        <feMergeNode/>
                                        <feMergeNode in="SourceGraphic"/>
                                    </feMerge>
                                </filter>
                                <filter id="glowStrong-${uniqueId}">
                                    <feGaussianBlur stdDeviation="6"/>
                                    <feMerge>
                                        <feMergeNode/>
                                        <feMergeNode in="SourceGraphic"/>
                                    </feMerge>
                                </filter>
                            </defs>
                            <rect width="300" height="300" fill="url(#bg-${uniqueId})"/>
                            <rect x="10" y="10" width="280" height="280" rx="12" fill="none" stroke="#d4af3740" stroke-width="1.5"/>
                            
                            <g>
                                <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="360 150 150" dur="25s" repeatCount="indefinite"/>
                                ${Array.from({length:8}, (_,i) => {
                                    const angle = (i/8)*360;
                                    return `<circle cx="${150 + Math.cos(angle*Math.PI/180)*110}" cy="${150 + Math.sin(angle*Math.PI/180)*110}" r="3" fill="#d4af3740" opacity="0.6">
                                                <animate attributeName="r" values="2;5;2" dur="3s" repeatCount="indefinite" begin="${i*0.4}s"/>
                                            </circle>`;
                                }).join('')}
                            </g>
                            
                            <circle cx="150" cy="150" r="95" fill="none" stroke="#d4af3720" stroke-width="1.5">
                                <animate attributeName="r" values="90;105;90" dur="4s" repeatCount="indefinite"/>
                            </circle>
                            <circle cx="150" cy="150" r="65" fill="none" stroke="#d4af3710" stroke-width="1">
                                <animate attributeName="r" values="60;70;60" dur="5s" repeatCount="indefinite"/>
                            </circle>
                            
                            <text x="150" y="140" text-anchor="middle" font-family="'Scheherazade New', 'Amiri', 'Arial', sans-serif" font-weight="bold" font-size="${fontSize}" fill="${mainColor}" filter="url(#glowStrong-${uniqueId})" dir="rtl">
                                ${arabText}
                                <animate attributeName="y" values="135;148;135" dur="4s" repeatCount="indefinite"/>
                            </text>
                            
                            <text x="150" y="185" text-anchor="middle" font-family="'Amiri', 'Segoe UI', serif" font-size="14" fill="${subColor}" opacity="0.8" filter="url(#glow-${uniqueId})">
                                ${latinText}
                                <animate attributeName="y" values="180;190;180" dur="4.5s" repeatCount="indefinite"/>
                            </text>
                            
                            <text x="150" y="220" text-anchor="middle" font-family="'Amiri', serif" font-size="11" fill="#b9ad9a" opacity="0.5">
                                ${categoryLabel}
                                <animate attributeName="y" values="215;225;215" dur="5s" repeatCount="indefinite"/>
                            </text>
                            
                            <circle cx="150" cy="250" r="5" fill="#d4af3740">
                                <animate attributeName="r" values="3;7;3" dur="2.5s" repeatCount="indefinite"/>
                            </circle>
                            
                            ${Array.from({length:6}, (_,i) => {
                                const x = 30 + Math.random()*240;
                                const y = 30 + Math.random()*240;
                                return `<circle cx="${x}" cy="${y}" r="1.5" fill="#d4af37" opacity="0.2">
                                            <animate attributeName="opacity" values="0.05;0.4;0.05" dur="${2+Math.random()*4}s" repeatCount="indefinite" begin="${Math.random()*3}s"/>
                                        </circle>`;
                            }).join('')}
                        </svg>
                    `;
            }

            // ===== RENDER =====
            const grid = document.getElementById('gifGrid');
            const filterBtns = document.querySelectorAll('.filter-btn');

            function render(category = 'all') {
                let filtered = category === 'all' ? allData : allData.filter(item => item.category === category);

                if (filtered.length === 0) {
                    grid.innerHTML = `<div class="no-gif"><i class="fas fa-search"></i> Tidak ada untuk kategori ini</div>`;
                    return;
                }

                let html = '';
                filtered.forEach((item) => {
                    let icon = item.category === 'asmaul-husna' ? 'fa-star' :
                        item.category === 'umar' ? 'fa-user-tie' :
                        item.category === 'muhammad' ? 'fa-flag' : 'fa-gem';

                    html += `
                            <div class="gif-card">
                                <div class="gif-wrapper">
                                    ${createKaligrafiSVG(item.arab, item.latin, item.category)}
                                </div>
                                <div class="label"><i class="fas ${icon}"></i> ${item.latin}</div>
                                <div class="tag">${item.category === 'asmaul-husna' ? 'Asmaul Husna' : item.category.toUpperCase()}</div>
                            </div>
                        `;
                });
                grid.innerHTML = html;
            }

            filterBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    render(this.dataset.filter);
                });
            });

            render('all');
        })();
    </script>
</body>
</html>
