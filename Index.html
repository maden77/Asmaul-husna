<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIF Kaligrafi | 99 Asmaul Husna & Tokoh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b1a1e;
            background-image: radial-gradient(circle at 20% 30%, #1a3a3f, #0b1a1e 80%);
            min-height: 100vh;
            font-family: 'Amiri', 'Segoe UI', serif;
            color: #e8e0d4;
            padding: 1.5rem 1rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #f3e9d2;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem 1rem;
        }
        .header h1 i {
            color: #d4af37;
            font-size: 2.5rem;
            filter: drop-shadow(0 0 8px #d4af3766);
        }
        .header .sub {
            font-size: 1.2rem;
            color: #b9ad9a;
            border-top: 1px solid #d4af3750;
            border-bottom: 1px solid #d4af3750;
            display: inline-block;
            padding: 0.3rem 2rem;
            margin-top: 0.5rem;
            letter-spacing: 2px;
            background: #0b1a1e55;
            backdrop-filter: blur(2px);
        }
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem 1rem;
            margin-bottom: 2rem;
        }
        .filter-btn {
            background: transparent;
            border: 1px solid #d4af3760;
            color: #d4c9b8;
            padding: 0.4rem 1.4rem;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.25s ease;
            font-family: 'Amiri', serif;
            letter-spacing: 1px;
            background: #1e2f2e40;
            backdrop-filter: blur(4px);
        }
        .filter-btn:hover,
        .filter-btn.active {
            background: #d4af37;
            color: #0b1a1e;
            border-color: #d4af37;
            box-shadow: 0 0 20px #d4af3760;
            transform: scale(1.03);
        }
        .gif-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 1.2rem;
        }
        .gif-card {
            background: linear-gradient(145deg, #1b3338, #0f2024);
            border-radius: 20px;
            padding: 0.8rem 0.6rem 0.6rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7), 0 0 0 1px #d4af3720;
            transition: 0.3s cubic-bezier(0.15, 0.75, 0.4, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .gif-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.8), 0 0 0 2px #d4af3770;
            background: #1f3a40;
        }
        .gif-wrapper {
            width: 100%;
            aspect-ratio: 1/1;
            background: #0e1e22;
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #d4af3730;
            box-shadow: inset 0 0 15px #00000055;
            position: relative;
        }
        .gif-wrapper canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .gif-card .label {
            margin-top: 0.5rem;
            font-size: 0.95rem;
            color: #f0e2cc;
            background: #0b1a1e80;
            padding: 0.1rem 0.8rem;
            border-radius: 40px;
            border: 1px solid #d4af3740;
            width: fit-content;
            backdrop-filter: blur(4px);
        }
        .gif-card .label i {
            color: #d4af37;
            margin-right: 5px;
            font-size: 0.8rem;
        }
        .gif-card .tag {
            font-size: 0.6rem;
            color: #b9ad9a;
            margin-top: 3px;
            background: #00000040;
            padding: 0.05rem 0.6rem;
            border-radius: 30px;
            border: 1px solid #d4af3720;
        }
        .no-gif {
            color: #b9ad9a;
            padding: 2rem;
            text-align: center;
            font-size: 1.2rem;
            width: 100%;
        }
        .footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.95rem;
            color: #8f8575;
            border-top: 1px solid #d4af3720;
            padding-top: 1.8rem;
            letter-spacing: 1px;
        }
        .footer i {
            color: #d4af37;
        }
        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }
            .header .sub {
                font-size: 0.9rem;
                padding: 0.2rem 1rem;
            }
            .filter-btn {
                font-size: 0.8rem;
                padding: 0.2rem 0.9rem;
            }
            .gif-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 0.8rem;
            }
            .gif-card .label {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-pen-fancy"></i> <span>99 Asmaul Husna</span> <i class="fas fa-moon"></i></h1>
            <div class="sub">✦ + Kaligrafi Umar · Muhammad ✦</div>
        </div>

        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-filter="all"><i class="fas fa-th"></i> Semua</button>
            <button class="filter-btn" data-filter="asmaul-husna"><i class="fas fa-star"></i> Asmaul Husna (99)</button>
            <button class="filter-btn" data-filter="umar"><i class="fas fa-user-tie"></i> Umar</button>
            <button class="filter-btn" data-filter="muhammad"><i class="fas fa-flag"></i> Muhammad</button>
            <button class="filter-btn" data-filter="lainnya"><i class="fas fa-gem"></i> Lainnya</button>
        </div>

        <div class="gif-grid" id="gifGrid"></div>

        <div class="footer">
            <i class="fas fa-heart" style="margin: 0 6px;"></i>
            Kumpulan Kaligrafi Animasi · 99 Asmaul Husna ·
            <i class="fas fa-quran" style="margin: 0 6px;"></i>
            Barakallah
        </div>
    </div>

    <script>
        (function() {
            // ========== 99 ASMAUL HUSNA ==========
            const asmaulHusna = [
                "Ar-Rahman", "Ar-Rahim", "Al-Malik", "Al-Quddus", "As-Salam", "Al-Mu'min", "Al-Muhaymin", "Al-Aziz", "Al-Jabbar",
                "Al-Mutakabbir",
                "Al-Khaliq", "Al-Bari'", "Al-Musawwir", "Al-Ghaffar", "Al-Qahhar", "Al-Wahhab", "Ar-Razzaq", "Al-Fattah", "Al-Alim",
                "Al-Qabid",
                "Al-Basit", "Al-Khafid", "Ar-Rafi'", "Al-Mu'izz", "Al-Mudhill", "As-Sami'", "Al-Basir", "Al-Hakam", "Al-Adl",
                "Al-Latif",
                "Al-Khabir", "Al-Halim", "Al-Azim", "Al-Ghafur", "Ash-Shakur", "Al-Aliy", "Al-Kabir", "Al-Hafiz", "Al-Muqit",
                "Al-Hasib",
                "Al-Jalil", "Al-Karim", "Ar-Raqib", "Al-Mujib", "Al-Wasi'", "Al-Hakim", "Al-Wadud", "Al-Majid", "Al-Ba'ith",
                "Ash-Shahid",
                "Al-Haqq", "Al-Wakil", "Al-Qawiyy", "Al-Matin", "Al-Waliyy", "Al-Hamid", "Al-Muhsi", "Al-Mubdi'", "Al-Mu'id",
                "Al-Muhyi",
                "Al-Mumit", "Al-Hayy", "Al-Qayyum", "Al-Wajid", "Al-Majid", "Al-Wahid", "Al-Ahad", "As-Samad", "Al-Qadir",
                "Al-Muqtadir",
                "Al-Muqaddim", "Al-Mu'akhkhir", "Al-Awwal", "Al-Akhir", "Az-Zahir", "Al-Batin", "Al-Wali", "Al-Muta'ali", "Al-Barr",
                "At-Tawwab",
                "Al-Muntaqim", "Al-Afuww", "Ar-Ra'uf", "Malik-ul-Mulk", "Dhu-l-Jalali wa-l-Ikram", "Al-Muqsit", "Al-Jami'",
                "Al-Ghani", "Al-Mughni",
                "Al-Mani'", "Ad-Darr", "An-Nafi'", "An-Nur", "Al-Hadi", "Al-Badi'", "Al-Baqi", "Al-Warith", "Ar-Rashid", "As-Sabur"
            ];

            // Data tambahan
            const extraData = [
                { title: 'Umar Al-Faruk', category: 'umar' },
                { title: 'Umar bin Khattab', category: 'umar' },
                { title: 'Khalifah Umar', category: 'umar' },
                { title: 'Muhammad ﷺ', category: 'muhammad' },
                { title: 'Nabi Muhammad', category: 'muhammad' },
                { title: 'Rasulullah', category: 'muhammad' },
                { title: 'Bismillah', category: 'lainnya' },
                { title: 'Allahu Akbar', category: 'lainnya' },
                { title: 'Kaligrafi Arab', category: 'lainnya' },
                { title: 'Subhanallah', category: 'lainnya' },
                { title: 'Alhamdulillah', category: 'lainnya' },
                { title: 'Lailahaillallah', category: 'lainnya' },
            ];

            // Gabungkan semua data
            let allData = [];
            asmaulHusna.forEach((name, idx) => {
                allData.push({
                    id: idx + 1,
                    title: name,
                    category: 'asmaul-husna'
                });
            });
            extraData.forEach((item, idx) => {
                allData.push({
                    id: 100 + idx,
                    title: item.title,
                    category: item.category
                });
            });

            // ========== FUNGSI GAMBAR KALIGRAFI DI CANVAS ==========
            function drawKaligrafi(canvas, text, category) {
                const ctx = canvas.getContext('2d');
                const w = canvas.width;
                const h = canvas.height;

                // Background
                const grad = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, w / 2);
                grad.addColorStop(0, '#1a3a3f');
                grad.addColorStop(1, '#0a171b');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);

                // Dekorasi border
                ctx.strokeStyle = '#d4af3740';
                ctx.lineWidth = 2;
                ctx.strokeRect(10, 10, w - 20, h - 20);

                // Pola bintang/ornamen
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2 + Date.now() * 0.0005;
                    const x = w / 2 + Math.cos(angle) * (w * 0.35);
                    const y = h / 2 + Math.sin(angle) * (h * 0.35);
                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = '#d4af3730';
                    ctx.fill();
                }

                // Lingkaran dalam
                ctx.beginPath();
                ctx.arc(w / 2, h / 2, w * 0.38, 0, Math.PI * 2);
                ctx.strokeStyle = '#d4af3720';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Teks utama - kaligrafi
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                // Efek glow
                ctx.shadowColor = '#d4af3760';
                ctx.shadowBlur = 20;

                // Pilih gaya berdasarkan kategori
                let fontSize = w * 0.22;
                let color = '#f3e9d2';

                if (category === 'asmaul-husna') {
                    color = '#f3e9d2';
                    fontSize = w * 0.16;
                } else if (category === 'umar') {
                    color = '#d4af37';
                    fontSize = w * 0.18;
                } else if (category === 'muhammad') {
                    color = '#7ec8e3';
                    fontSize = w * 0.18;
                } else {
                    color = '#b9ad9a';
                    fontSize = w * 0.17;
                }

                // Teks utama (jika panjang, kecilkan)
                let displayText = text;
                if (displayText.length > 15) {
                    fontSize = w * 0.12;
                } else if (displayText.length > 10) {
                    fontSize = w * 0.14;
                }

                ctx.font = `bold ${fontSize}px 'Amiri', serif`;
                ctx.fillStyle = color;
                ctx.shadowBlur = 25;
                ctx.fillText(displayText, w / 2, h / 2 - 5);

                // Sub teks - kategori
                ctx.shadowBlur = 10;
                ctx.font = `${w * 0.06}px 'Amiri', serif`;
                ctx.fillStyle = '#b9ad9a80';
                let subText = category === 'asmaul-husna' ? '✨ Asmaul Husna' :
                    category === 'umar' ? '⚔️ Umar' :
                    category === 'muhammad' ? '🕌 Muhammad' : '☪️';
                ctx.fillText(subText, w / 2, h / 2 + fontSize * 0.7);

                // Ornamen bawah
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(w / 2, h - 20, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#d4af3720';
                ctx.fill();

                // Animasi partikel (akan di-update setiap frame)
            }

            // ========== FUNGSI ANIMASI ==========
            function animateCanvas(canvas, text, category) {
                let frame = 0;

                function drawFrame() {
                    frame++;
                    const ctx = canvas.getContext('2d');
                    const w = canvas.width;
                    const h = canvas.height;

                    // Background dengan efek berubah
                    const grad = ctx.createRadialGradient(
                        w / 2 + Math.sin(frame * 0.01) * 10,
                        h / 2 + Math.cos(frame * 0.015) * 10,
                        0,
                        w / 2,
                        h / 2,
                        w / 2
                    );
                    grad.addColorStop(0, '#1a3a3f');
                    grad.addColorStop(0.6, '#0f2024');
                    grad.addColorStop(1, '#0a171b');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, w, h);

                    // Ornamen berputar
                    ctx.save();
                    ctx.translate(w / 2, h / 2);
                    for (let i = 0; i < 8; i++) {
                        const angle = (i / 8) * Math.PI * 2 + frame * 0.008;
                        const x = Math.cos(angle) * (w * 0.38);
                        const y = Math.sin(angle) * (w * 0.38);
                        ctx.beginPath();
                        ctx.arc(x, y, 3 + Math.sin(frame * 0.05 + i) * 1.5, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(212, 175, 55, ${0.2 + Math.sin(frame * 0.03 + i) * 0.1})`;
                        ctx.fill();
                    }
                    ctx.restore();

                    // Lingkaran berdenyut
                    ctx.beginPath();
                    const pulse = 1 + Math.sin(frame * 0.02) * 0.02;
                    ctx.arc(w / 2, h / 2, w * 0.38 * pulse, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(212, 175, 55, ${0.15 + Math.sin(frame * 0.025) * 0.05})`;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();

                    // Lingkaran dalam kedua
                    ctx.beginPath();
                    ctx.arc(w / 2, h / 2, w * 0.2 * pulse, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(212, 175, 55, ${0.08 + Math.sin(frame * 0.02 + 1) * 0.04})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    // Teks utama
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';

                    let fontSize = w * 0.22;
                    let color = '#f3e9d2';
                    if (category === 'asmaul-husna') {
                        color = '#f3e9d2';
                        fontSize = w * 0.16;
                    } else if (category === 'umar') {
                        color = '#d4af37';
                        fontSize = w * 0.18;
                    } else if (category === 'muhammad') {
                        color = '#7ec8e3';
                        fontSize = w * 0.18;
                    } else {
                        color = '#b9ad9a';
                        fontSize = w * 0.17;
                    }

                    let displayText = text;
                    if (displayText.length > 15) fontSize = w * 0.12;
                    else if (displayText.length > 10) fontSize = w * 0.14;

                    ctx.shadowColor = '#d4af3760';
                    ctx.shadowBlur = 25 + Math.sin(frame * 0.03) * 5;
                    ctx.font = `bold ${fontSize}px 'Amiri', serif`;
                    ctx.fillStyle = color;
                    ctx.fillText(displayText, w / 2, h / 2 - 5 + Math.sin(frame * 0.02) * 2);

                    // Sub teks
                    ctx.shadowBlur = 10;
                    ctx.font = `${w * 0.06}px 'Amiri', serif`;
                    ctx.fillStyle = '#b9ad9a80';
                    let subText = category === 'asmaul-husna' ? '✨ Asmaul Husna' :
                        category === 'umar' ? '⚔️ Umar' :
                        category === 'muhammad' ? '🕌 Muhammad' : '☪️';
                    ctx.fillText(subText, w / 2, h / 2 + fontSize * 0.7 + Math.sin(frame * 0.025 + 1) * 2);

                    // Ornamen bawah berkedip
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.arc(w / 2, h - 20, 6 + Math.sin(frame * 0.04) * 2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(212, 175, 55, ${0.2 + Math.sin(frame * 0.03) * 0.1})`;
                    ctx.fill();

                    requestAnimationFrame(drawFrame);
                }

                drawFrame();
            }

            // ========== RENDER ==========
            const grid = document.getElementById('gifGrid');
            const filterBtns = document.querySelectorAll('.filter-btn');

            function render(category = 'all') {
                let filtered = allData;
                if (category !== 'all') {
                    filtered = allData.filter(item => item.category === category);
                }

                if (filtered.length === 0) {
                    grid.innerHTML =
                        `<div class="no-gif"><i class="fas fa-search" style="margin-right:8px;"></i> Tidak ada untuk kategori ini</div>`;
                    return;
                }

                let html = '';
                filtered.forEach((item, index) => {
                    let icon = 'fa-pen-fancy';
                    if (item.category === 'asmaul-husna') icon = 'fa-star';
                    else if (item.category === 'umar') icon = 'fa-user-tie';
                    else if (item.category === 'muhammad') icon = 'fa-flag';
                    else icon = 'fa-gem';

                    const canvasId = `canvas-${item.id}-${index}`;
                    html += `
                            <div class="gif-card" data-category="${item.category}">
                                <div class="gif-wrapper">
                                    <canvas id="${canvasId}" width="300" height="300"></canvas>
                                </div>
                                <div class="label"><i class="fas ${icon}"></i> ${item.title}</div>
                                <div class="tag">${item.category === 'asmaul-husna' ? 'Asmaul Husna' : item.category.toUpperCase()}</div>
                            </div>
                        `;
                });

                grid.innerHTML = html;

                // Inisialisasi canvas setelah render
                setTimeout(() => {
                    filtered.forEach((item, index) => {
                        const canvasId = `canvas-${item.id}-${index}`;
                        const canvas = document.getElementById(canvasId);
                        if (canvas) {
                            // Set ukuran agar responsif
                            const rect = canvas.parentElement.getBoundingClientRect();
                            const size = Math.min(rect.width || 300, 300);
                            canvas.width = size;
                            canvas.height = size;
                            animateCanvas(canvas, item.title, item.category);
                        }
                    });
                }, 50);
            }

            filterBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    render(this.getAttribute('data-filter'));
                });
            });

            render('all');

            // Handle resize
            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    const currentFilter = document.querySelector('.filter-btn.active');
                    if (currentFilter) {
                        render(currentFilter.getAttribute('data-filter'));
                    }
                }, 300);
            });
        })();
    </script>
</body>
</html>
